services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: env_mqtt_broker
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: env_mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: env_monitoring
      MYSQL_USER: envuser
      MYSQL_PASSWORD: envpass
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/mysql_schema.sql:/docker-entrypoint-initdb.d/mysql_schema.sql
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: env_mongodb_db
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpass
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    container_name: env_neo4j_db
    environment:
      NEO4J_AUTH: neo4j/password123
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped

volumes:
  mosquitto_data:
  mosquitto_log:
  mysql_data:
  mongo_data:
  neo4j_data:
  neo4j_logs:
